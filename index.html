<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بشير للمناسبات الفاخرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;800&display=swap">
    
    <style>
        /* إعدادات وتصفير */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* خلفية ليلية عميقة مع إضاءة محيطية فاخرة */
        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.05), transparent 25%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
            overflow-x: hidden;
        }

        .wrapper {
            width: 100%;
            max-width: 440px;
            text-align: center;
            z-index: 10;
        }

        /* بطاقة زجاجية فاخرة بلمسة معدنية */
        .premium-card {
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.9), rgba(5, 5, 5, 0.95));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px 25px;
            border-radius: 35px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-top: 1px solid rgba(255, 215, 0, 0.4); 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 1px 15px rgba(255, 215, 0, 0.05);
            animation: cardEntrance 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        /* تأثير طفو للصورة مع حلقات ذهبية متداخلة ناعمة الإضاءة */
        .avatar-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 30px;
            animation: floating 4s ease-in-out infinite;
        }

        .avatar-wrapper::before, .avatar-wrapper::after {
            content: '';
            position: absolute;
            top: -3px; left: -3px; right: -3px; bottom: -3px;
            border-radius: 50%;
            background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            z-index: -1;
            animation: spin 8s linear infinite;
        }

        .avatar-wrapper::after {
            filter: blur(12px);
            opacity: 0.4;
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #111;
        }

        /* تدرج الذهب المعدني الاحترافي */
        .gold-text {
            background: linear-gradient(to right, #bf953f 0%, #fcf6ba 30%, #b38728 70%, #aa771c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .premium-card h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* رفع التباين ليصبح مقروءاً بوضوح تالي */
        .premium-card p {
            font-size: 14.5px;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.8;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .highlight-text {
            font-weight: 700;
        }

        /* أزرار فاخرة موحدة الألوان */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .luxury-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            text-decoration: none;
            color: #e0e0e0;
            font-size: 16px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            opacity: 0;
            transform: translateX(-20px);
            animation: slideIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .luxury-btn:nth-child(1) { animation-delay: 0.3s; }
        .luxury-btn:nth-child(2) { animation-delay: 0.5s; }
        .luxury-btn:nth-child(3) { animation-delay: 0.7s; }

        /* تأثير اللمعة المارة */
        .luxury-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.08), transparent);
            transform: skewX(-25deg);
            animation: shineSweep 4s infinite;
        }

        .luxury-btn:active {
            transform: scale(0.95);
            background: rgba(212, 175, 55, 0.08);
            border-color: #d4af37;
        }

        /* توحيد الأيقونات باللون الذهبي المعدني الفخم */
        .luxury-btn i.brand-icon {
            font-size: 24px;
            width: 35px;
            text-align: center;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* تعديل وزن وبريق السهم الأيسر ليصبح متناسقاً */
        .luxury-btn .arrow-icon {
            font-size: 14px;
            font-weight: 900;
            color: #d4af37;
            transition: transform 0.3s ease;
        }

        .luxury-btn:hover .arrow-icon {
            transform: translateX(-5px);
        }

        /* Animations */
        @keyframes cardEntrance {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes shineSweep {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="premium-card">
            
            <div class="avatar-wrapper">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=400" alt="مناسبات وأعراس فاخرة">
            </div>

            <h1 class="gold-text">نصنع ذكريات خالدة</h1>
            <p>تفاصيل استثنائية ولمسات ملكية لتنظيم أفخم الأعراس والمناسبات في مكة وجدة. <br> <span class="highlight-text gold-text">(وصيفة عروس، تنظيم أهل العريس، وتوثيق سينمائي)</span></p>

            <div class="links-container">
                
                <a href="#" class="luxury-btn">
                    <i class="fab fa-whatsapp brand-icon"></i>
                    <span>تواصل معنا للحجز والاستفسار</span>
                    <i class="fas fa-chevron-left arrow-icon"></i>
                </a>
                
                <a href="#" class="luxury-btn">
                    <i class="fab fa-snapchat brand-icon"></i>
                    <span>كواليسنا الفاخرة على سناب شات</span>
                    <i class="fas fa-chevron-left arrow-icon"></i>
                </a>
                
                <a href="#" class="luxury-btn">
                    <i class="fab fa-instagram brand-icon"></i>
                    <span>معرض أعمالنا الملكي</span>
                    <i class="fas fa-chevron-left arrow-icon"></i>
                </a>
                
            </div>
        </div>
    </div>

</body>
</html>
