<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لتنظيم المناسبات الفاخرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* خلفية داكنة مع إضاءة ذهبية علوية خافتة */
        body {
            background-color: #0d0d0d;
            background-image: radial-gradient(circle at 50% -20%, #3d2e14 0%, #0d0d0d 60%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }

        .wrapper {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        /* حاوية زجاجية فخمة (Glassmorphism) */
        .profile-card {
            background: rgba(25, 25, 25, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 25px;
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(212, 175, 55, 0.05);
            animation: fadeIn 1s ease-out;
        }

        /* الصورة بحواف ذهبية متوهجة */
        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d4af37;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
        }

        /* نصوص أنيقة */
        .profile-card h1 {
            font-size: 24px;
            color: #d4af37; /* لون ذهبي */
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .profile-card p {
            font-size: 14px;
            color: #b3b3b3;
            line-height: 1.8;
            margin-bottom: 35px;
            font-weight: 300;
        }

        /* الأزرار بتأثير نيون ذهبي خفيف */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            text-decoration: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: 400;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: slideUp 0.6s ease forwards;
        }

        .btn-link:nth-child(1) { animation-delay: 0.2s; }
        .btn-link:nth-child(2) { animation-delay: 0.4s; }
        .btn-link:nth-child(3) { animation-delay: 0.6s; }

        /* تأثير التوهج عند الضغط */
        .btn-link:active {
            transform: scale(0.96);
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        /* تخصيص الأيقونات */
        .btn-link i.brand-icon {
            font-size: 22px;
            width: 30px;
            text-align: center;
        }

        /* ألوان الأيقونات بتدرجات هادئة تتناسب مع الفخامة */
        .whatsapp i.brand-icon { color: #25d366; text-shadow: 0 0 10px rgba(37, 211, 102, 0.4); }
        .snapchat i.brand-icon { color: #fffc00; text-shadow: 0 0 10px rgba(255, 252, 0, 0.4); }
        .instagram i.brand-icon { color: #e1306c; text-shadow: 0 0 10px rgba(225, 48, 108, 0.4); }

        .btn-link .arrow-icon {
            font-size: 12px;
            color: #d4af37;
            transition: transform 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="profile-card">
            
            <!-- صورة واضحة وعالية الدقة تناسب الأعراس -->
            <div class="avatar-container">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=400" alt="مناسبات وأعراس">
            </div>

            <h1>لتنظيم الفعاليات والمناسبات</h1>
            <p>وصيفة عروس، تنظيم أهل العريس، تصوير جوال احترافي وتغطية شاملة لكل حفلاتكم ومناسباتكم السعيدة في مكة وجدة برقي واحترافية.</p>

            <div class="links-container">
                
                <a href="#" class="btn-link whatsapp">
                    <i class="fab fa-whatsapp brand-icon"></i>
                    <span>تواصل معنا عبر الواتساب</span>
                    <i class="fas fa-chevron-left arrow-icon"></i>
                </a>
                
                <a href="#" class="btn-link snapchat">
                    <i class="fab fa-snapchat brand-icon"></i>
                    <span>تابعنا على سناب شات</span>
                    <i class="fas fa-chevron-left arrow-icon"></i>
                </a>
                
                <a href="#" class="btn-link instagram">
                    <i class="fab fa-instagram brand-icon"></i>
                    <span>شاهد أعمالنا على إنستغرام</span>
                    <i class="fas fa-chevron-left arrow-icon"></i>
                </a>
                
            </div>
        </div>
    </div>

</body>
</html>
