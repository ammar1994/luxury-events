<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Events | الإبداع الملكي لتنظيم المناسبات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700;900&display=swap">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0A0A0A;
            font-family: 'Cairo', sans-serif;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            background-image: radial-gradient(circle at 50% 20%, #1E1910 0%, #0A0A0A 75%);
        }

        .main-showcase {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* 1. قسم الهوية والقوة البصرية */
        .hero-brand {
            text-align: center;
            margin-bottom: 10px;
        }

        .royal-logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid #D4AF37;
            padding: 6px;
            background: #0A0A0A;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.2);
            object-fit: cover;
            margin-bottom: 20px;
        }

        .main-title {
            font-size: 26px;
            font-weight: 900;
            color: #E6C687;
            letter-spacing: 0.5px;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .sub-title {
            font-size: 13px;
            color: #A0A0A0;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 2. بطاقة الثقة والاحترافية (ترتيب جديد تماماً) */
        .trust-card {
            background: linear-gradient(135deg, #141416 0%, #0F0F10 100%);
            border: 1px solid #231F17;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .statement {
            font-size: 15px;
            color: #E0E0E0;
            line-height: 1.7;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .stats-grid {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #231F17;
            padding-top: 15px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-num {
            font-size: 18px;
            font-weight: 700;
            color: #D4AF37;
        }

        .stat-label {
            font-size: 11px;
            color: #888888;
        }

        /* 3. شبكة الأزرار التفاعلية الحركية (Grid) */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        /* زر الحجز الرئيسي يأخذ المساحة الكاملة بالأعلى لأهميته */
        .cta-full {
            grid-column: span 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(90deg, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%);
            color: #000000;
            text-decoration: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 8px 25px rgba(170, 119, 28, 0.3);
            transition: transform 0.2s ease;
        }

        /* أزرار الشبكة الفاخرة */
        .grid-box {
            background: #141416;
            border: 1px solid #231F17;
            border-radius: 14px;
            padding: 22px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #FFFFFF;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .grid-box i {
            font-size: 24px;
            color: #D4AF37;
        }

        .grid-box span {
            font-size: 13px;
            font-weight: 500;
            color: #E0E0E0;
        }

        /* تأثيرات اللمس الاحترافية للموبايل */
        .cta-full:active, .grid-box:active {
            transform: scale(0.95);
            background-color: #1A1917;
            border-color: #D4AF37;
        }
    </style>
</head>
<body>

    <div class="main-showcase">
        
        <!-- 1. الـ Hero الفاخر -->
        <div class="hero-brand">
            <!-- تم تغيير الصورة لصورة تعكس تنظيم قاعات ملكية فخمة جداً -->
            <img class="royal-logo" src="https://images.unsplash.com/photo-1469371670807-013ccf25f16a?q=80&w=200" alt="Luxury Logo">
            <h1 class="main-title">LUXURY EVENTS</h1>
            <p class="sub-title">صناع الذكريات الملوكية</p>
        </div>

        <!-- 2. بطاقة الثقة والترتيب الجديد -->
        <div class="trust-card">
            <p class="statement">نحن لا ننظم مناسبات عادية، بل نصيغ تحفاً بصرية تخلد في الذاكرة بأعلى معايير الأناقة والاحترافية العالمية.</p>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-num">+150</span>
                    <span class="stat-label">حفل ملكي</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num">100%</span>
                    <span class="stat-label">إتقان فني</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num">Premium</span>
                    <span class="stat-label">فئة النخبة</span>
                </div>
            </div>
        </div>

        <!-- 3. شبكة التحكم والتواصل الاحترافية -->
        <div class="action-grid">
            
            <a href="#" class="cta-full" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>ابدأ التخطيط لمناسبتك الفاخرة</span>
            </a>

            <a href="#" class="grid-box" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>معرض النخبة</span>
            </a>

            <a href="#" class="grid-box" target="_blank">
                <i class="fab fa-snapchat"></i>
                <span>التغطية الحية</span>
            </a>

        </div>

    </div>

</body>
</html>
